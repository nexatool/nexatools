<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Dark background (iOS crops to circle/rounded square) -->
  <rect width="180" height="180" rx="40" fill="#0d1117"/>
  <!-- Outer hexagon -->
  <polygon points="90,28 130,50 130,94 90,116 50,94 50,50"
    fill="none" stroke="#00e5ff" stroke-width="2.5"/>
  <!-- Inner hex fill -->
  <polygon points="90,44 116,58 116,86 90,100 64,86 64,58"
    fill="#00e5ff" opacity="0.18"/>
  <!-- Inner hex border -->
  <polygon points="90,44 116,58 116,86 90,100 64,86 64,58"
    fill="none" stroke="#00e5ff" stroke-width="1.8"/>
  <!-- N lettermark -->
  <text x="90" y="94" text-anchor="middle"
    font-family="'Clash Display','Inter',sans-serif"
    font-weight="700" font-size="38" fill="#00e5ff" letter-spacing="-1">N</text>
  <!-- Corner dots -->
  <circle cx="90"  cy="28" r="3.5" fill="#00e5ff"/>
  <circle cx="130" cy="50" r="3.5" fill="#00e5ff"/>
  <circle cx="130" cy="94" r="3.5" fill="#00e5ff"/>
  <circle cx="90"  cy="116" r="3.5" fill="#00e5ff"/>
  <circle cx="50"  cy="94" r="3.5" fill="#00e5ff"/>
  <circle cx="50"  cy="50" r="3.5" fill="#00e5ff"/>
  <!-- Wordmark below icon -->
  <text x="90" y="148" text-anchor="middle"
    font-family="'Clash Display','Inter',sans-serif"
    font-weight="700" font-size="18" fill="#ffffff" letter-spacing="-0.3">Nexa<tspan fill="#00e5ff">Tools</tspan></text>
</svg>
