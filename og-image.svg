<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0d1117"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(0,229,255,0.04)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow orb left -->
  <ellipse cx="200" cy="350" rx="280" ry="260" fill="rgba(0,229,255,0.04)"/>
  <!-- Glow orb right -->
  <ellipse cx="1060" cy="280" rx="220" ry="200" fill="rgba(130,80,255,0.05)"/>

  <!-- Icon — centred at 400, 280 -->
  <polygon points="400,148 472,189 472,271 400,312 328,271 328,189"
    fill="none" stroke="#00e5ff" stroke-width="3.5"/>
  <polygon points="400,178 452,207 452,265 400,294 348,265 348,207"
    fill="#00e5ff" opacity="0.14"/>
  <polygon points="400,178 452,207 452,265 400,294 348,265 348,207"
    fill="none" stroke="#00e5ff" stroke-width="2.2"/>
  <text x="400" y="288" text-anchor="middle"
    font-family="'Clash Display','Inter',sans-serif"
    font-weight="700" font-size="70" fill="#00e5ff" letter-spacing="-2">N</text>
  <circle cx="400" cy="148" r="5" fill="#00e5ff"/>
  <circle cx="472" cy="189" r="5" fill="#00e5ff"/>
  <circle cx="472" cy="271" r="5" fill="#00e5ff"/>
  <circle cx="400" cy="312" r="5" fill="#00e5ff"/>
  <circle cx="328" cy="271" r="5" fill="#00e5ff"/>
  <circle cx="328" cy="189" r="5" fill="#00e5ff"/>

  <!-- Wordmark -->
  <text x="520" y="290"
    font-family="'Clash Display','Inter',sans-serif"
    font-weight="700" font-size="88" fill="#ffffff" letter-spacing="-3">Nexa<tspan fill="#00e5ff">Tools</tspan><tspan fill="rgba(255,255,255,0.25)" font-size="50" dy="-12">.io</tspan></text>

  <!-- Tagline -->
  <text x="520" y="336"
    font-family="'General Sans','Inter',sans-serif"
    font-weight="400" font-size="22" fill="rgba(255,255,255,0.4)" letter-spacing="5">FREE TOOLS FOR EVERYONE</text>

  <!-- Pills -->
  <rect x="520" y="370" width="150" height="36" rx="18"
    fill="rgba(0,229,255,0.1)" stroke="rgba(0,229,255,0.3)" stroke-width="1"/>
  <text x="595" y="393" text-anchor="middle"
    font-family="'General Sans','Inter',sans-serif"
    font-size="14" font-weight="600" fill="#00e5ff" letter-spacing="1">100% FREE</text>

  <rect x="684" y="370" width="150" height="36" rx="18"
    fill="rgba(0,229,255,0.1)" stroke="rgba(0,229,255,0.3)" stroke-width="1"/>
  <text x="759" y="393" text-anchor="middle"
    font-family="'General Sans','Inter',sans-serif"
    font-size="14" font-weight="600" fill="#00e5ff" letter-spacing="1">NO LOGIN</text>

  <rect x="848" y="370" width="180" height="36" rx="18"
    fill="rgba(0,229,255,0.1)" stroke="rgba(0,229,255,0.3)" stroke-width="1"/>
  <text x="938" y="393" text-anchor="middle"
    font-family="'General Sans','Inter',sans-serif"
    font-size="14" font-weight="600" fill="#00e5ff" letter-spacing="1">INSTANT TOOLS</text>

  <!-- Bottom domain -->
  <text x="600" y="570" text-anchor="middle"
    font-family="'General Sans','Inter',sans-serif"
    font-weight="400" font-size="16" fill="rgba(255,255,255,0.2)" letter-spacing="2">nexatools.io</text>
</svg>
