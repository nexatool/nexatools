<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Outer hexagon -->
  <polygon points="48,6 80,24 80,60 48,78 16,60 16,24"
    fill="none" stroke="#00e5ff" stroke-width="3"/>
  <!-- Inner hex fill -->
  <polygon points="48,20 68,31 68,53 48,64 28,53 28,31"
    fill="#00e5ff" opacity="0.18"/>
  <!-- Inner hex border -->
  <polygon points="48,20 68,31 68,53 48,64 28,53 28,31"
    fill="none" stroke="#00e5ff" stroke-width="2"/>
  <!-- N lettermark -->
  <text x="48" y="57" text-anchor="middle"
    font-family="'Clash Display','Inter',sans-serif"
    font-weight="700" font-size="30" fill="#00e5ff" letter-spacing="-1">N</text>
  <!-- Corner dots -->
  <circle cx="48" cy="6"  r="3" fill="#00e5ff"/>
  <circle cx="80" cy="24" r="3" fill="#00e5ff"/>
  <circle cx="80" cy="60" r="3" fill="#00e5ff"/>
  <circle cx="48" cy="78" r="3" fill="#00e5ff"/>
  <circle cx="16" cy="60" r="3" fill="#00e5ff"/>
  <circle cx="16" cy="24" r="3" fill="#00e5ff"/>
</svg>
